<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css?family=Roboto+Mono&display=swap" rel="stylesheet">
    <link href="./index.css" rel="stylesheet">
    <link href="./libs/color-picker.min.css" rel="stylesheet">
    <title>Dark Scratch Editor</title>
  </head>
  <body>
    <main>
      <h1>Dark Scratch Editor</h1>
      <section id="options">
        <div class="option">
          <label>Theme: </label>
          <div id="theme" class="select">
            <div class="select-head">Classic</div>
            <div class="options">
              <div id="theme-classic" class="select-option selected">Classic</div>
              <div id="theme-seablue" class="select-option">Sea Blue</div>
              <div id="theme-deepblack" class="select-option">Deep Black</div>
            </div>
          </div>
        </div>
        <div class="option">
          <label for="customthemecolor">Custom theme colors:</label>
          <input id="customthemecolor" type="checkbox" name="customthemecolor">
          <div id="customthemecolorsettings">
            <div class="color">
              <label for="primarycolor">Primary:</label>
              <div class="colorinput" id="primarycolor"></div>
            </div>
            <div class="color">
              <label for="secundarycolor">Secundary:</label>
              <div class="colorinput" id="secundarycolor"></div>
            </div>
          </div>
        </div>
        <div id="confirm">
          <button id="getcss" type="button" name="getcss">Get CSS</button>
          <button id="getuserjs" type="button" name="getuserjs">Get UserJS</button>
        </div>
      </section>
      <section id="code">
        <textarea id="output" name="output" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        <div id="codecontrol">
          <button class="return" type="button" name="return">❮</button>
          <button class="copy" type="button" name="copy"><img src="./img/copy.png"><span>Copy</span></button>
        </div>
      </section>
    </main>
    <script type="text/javascript" src="./libs/color-picker.min.js"></script>
    <script type="text/javascript" src="./index.js"></script>
  </body>
</html>
